<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishCatch</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="url(#grad)"/>
            <path d="M14 6C10.686 6 8 8.686 8 12c0 2.21 1.207 4.14 3 5.17V19a1 1 0 001 1h4a1 1 0 001-1v-1.83c1.793-1.03 3-2.96 3-5.17 0-3.314-2.686-6-6-6zm0 2a1 1 0 011 1v2.586l1.707 1.707a1 1 0 01-1.414 1.414L14 13.414l-1.293 1.293a1 1 0 01-1.414-1.414L13 11.586V9a1 1 0 011-1z" fill="white" opacity="0.95"/>
            <rect x="10" y="21" width="8" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
            <defs>
              <linearGradient id="grad" x1="0" y1="0" x2="28" y2="28">
                <stop offset="0%" stop-color="#6366f1"/>
                <stop offset="100%" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <h1 class="header-title">PhishCatch</h1>
          <p class="header-subtitle">AI Phishing Detector</p>
        </div>
      </div>
      <button id="settingsBtn" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </header>

    <!-- Status Card -->
    <div class="status-card" id="statusCard">
      <div class="status-icon" id="statusIcon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="status-info">
        <div class="status-label" id="statusLabel">Protected</div>
        <div class="status-desc" id="statusDesc">Navigate to Gmail to start scanning emails</div>
      </div>
    </div>

    <!-- Quick Scan Button -->
    <button class="scan-btn" id="scanBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      Scan Current Email
    </button>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="totalScans">0</div>
        <div class="stat-label">Scanned</div>
      </div>
      <div class="stat-card stat-safe">
        <div class="stat-number" id="safeCount">0</div>
        <div class="stat-label">Safe</div>
      </div>
      <div class="stat-card stat-suspicious">
        <div class="stat-number" id="suspiciousCount">0</div>
        <div class="stat-label">Suspicious</div>
      </div>
      <div class="stat-card stat-dangerous">
        <div class="stat-number" id="dangerousCount">0</div>
        <div class="stat-label">Dangerous</div>
      </div>
    </div>

    <!-- Recent Scans -->
    <div class="section">
      <h2 class="section-title">Recent Scans</h2>
      <div id="scanHistory" class="scan-list">
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <p>No emails scanned yet</p>
          <p class="empty-hint">Open an email in Gmail to auto-scan</p>
        </div>
      </div>
    </div>

    <!-- Settings Panel (hidden by default) -->
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-header">
        <h2 class="section-title">Settings</h2>
        <button id="closeSettings" class="icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <label class="setting-label">API Endpoint</label>
      <input type="url" id="apiUrl" class="setting-input" placeholder="https://your-api.vercel.app">
      <button id="saveSettings" class="save-btn">Save Settings</button>
      <button id="clearHistory" class="clear-btn">Clear Scan History</button>
    </div>
  </div>

  <script src="scripts/popup.js"></script>
</body>
</html>
