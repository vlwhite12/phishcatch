<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="shieldGrad48" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldInner48" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shield outer -->
  <path d="M24 2 L42 9 L42 24 C42 35 34 43 24 46 C14 43 6 35 6 24 L6 9 Z"
        fill="url(#shieldGrad48)" />
  <!-- Shield inner highlight -->
  <path d="M24 6 L38 11.5 L38 24 C38 33 31 40 24 42.5 C17 40 10 33 10 24 L10 11.5 Z"
        fill="url(#shieldInner48)" opacity="0.4"/>
  <!-- Fish hook (J shape) - larger -->
  <path d="M30 10 L30 28 Q30 36 24 36 Q18 36 18 29 Q18 23 23 23"
        fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Hook barb -->
  <path d="M23 23 L28 20" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Eye of hook (small circle at top) -->
  <circle cx="30" cy="10" r="2" fill="white"/>
  <!-- Cross-out line (diagonal red line) -->
  <line x1="10" y1="10" x2="38" y2="38" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
  <!-- Second cross line for X -->
  <line x1="38" y1="10" x2="10" y2="38" stroke="#ef4444" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
